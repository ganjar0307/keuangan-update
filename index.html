<!DOCTYPE html>
<html lang="id">

<head>

<link
rel="manifest"
href="manifest.json">

<meta
name="theme-color"
content="#312E81">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Family Finance
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body
class="min-h-screen bg-gradient-to-br from-indigo-900 via-blue-700 to-slate-900 flex items-center justify-center p-5">

<div
class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

<div class="text-center">

<h1
class="text-3xl font-bold">
Family Finance
</h1>

<p
class="text-gray-500 mt-2">
Pencatatan Keuangan Rumah Tangga
</p>

</div>

<div class="mt-8">

<div class="mb-4">

<label>
Username
</label>

<input
id="username"
type="text"
placeholder="Masukkan username"

class="w-full border p-3 rounded-xl mt-2">

</div>

<div class="mb-4">

<label>
Password
</label>

<input
id="password"
type="password"
placeholder="Masukkan password"

class="w-full border p-3 rounded-xl mt-2">

</div>

<button

id="btnLogin"

onclick="login()"

class="w-full bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700">

Masuk

</button>

<div
id="error"

class="hidden mt-4 bg-red-100 text-red-700 p-3 rounded-xl">

</div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script>

if(
"serviceWorker"
in navigator
){

navigator
.serviceWorker
.register(
"./sw.js"
);

}

</script>

</body>

</html>
