<!DOCTYPE html>
<html lang="id">

<head>

<link
rel="manifest"
href="manifest.json">

<meta
name="theme-color"
content="#312E81">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard - Family Finance</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="flex min-h-screen">

<!-- SIDEBAR -->

<aside class="hidden md:block w-72 bg-indigo-900 text-white p-6">

<h1 class="text-2xl font-bold">
Family Finance
</h1>

<p class="text-indigo-200 mt-2">
Kelola Keuangan Rumah Tangga
</p>

<nav class="mt-8 space-y-2">

<a class="block bg-indigo-700 p-3 rounded-xl">

🏠 Dashboard

</a>

<a class="block p-3 rounded-xl hover:bg-indigo-800">

💳 Transaksi

</a>

<a class="block p-3 rounded-xl hover:bg-indigo-800">

📊 Laporan

</a>

<button
onclick="logout()"
class="w-full text-left p-3 rounded-xl hover:bg-red-700">

🚪 Logout

</button>

</nav>

</aside>

<!-- MAIN -->

<main class="flex-1 p-6">

<div class="bg-white p-5 rounded-2xl shadow">

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<div>

<h1 class="text-3xl font-bold">

Dashboard Transaksi

</h1>

<p
id="welcome"
class="text-slate-500">

</p>

</div>

<button
onclick="exportExcel()"
class="bg-green-600 text-white px-4 py-3 rounded-xl">

Excel

</button>

<button
onclick="exportPDF()"
class="bg-red-600 text-white px-4 py-3 rounded-xl">

PDF

</button>

<button
onclick="openModal()"
class="bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700">

+ Tambah Transaksi

</button>

</div>

</div>


<!-- SEARCH + FILTER -->

<div class="bg-white p-4 rounded-2xl shadow mt-5">

<div class="flex gap-3 flex-wrap">

<input
id="search"
placeholder="Cari transaksi..."
class="border p-3 rounded-xl flex-1">

<select
id="periode"
class="border p-3 rounded-xl">

<option value="">

Semua Periode

</option>

<option value="harian">

Harian

</option>

<option value="mingguan">

Mingguan

</option>

<option value="bulanan">

Bulanan

</option>

</select>

</div>

</div>


<!-- TABLE -->

<div class="bg-white rounded-2xl shadow mt-5 overflow-x-auto">

<table class="w-full">

<thead class="bg-slate-100">

<tr>

<th class="p-4">

Tanggal

</th>

<th>

Kategori

</th>

<th>

Jenis

</th>

<th>

Nominal

</th>

<th>

Keterangan

</th>

<th>

Aksi

</th>

</tr>

</thead>

<tbody
id="tbody">

</tbody>

</table>

</div>


<!-- PAGINATION -->

<div class="mt-5 flex justify-center items-center gap-3">

<button
onclick="prevPage()"
class="bg-slate-300 px-4 py-2 rounded">

◀

</button>

<span
id="pageNumber">

1

</span>

<button
onclick="nextPage()"
class="bg-slate-300 px-4 py-2 rounded">

▶

</button>

</div>

</main>

</div>


<!-- MODAL -->

<div
id="modal"
class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

<div class="bg-white w-[95%] md:w-full max-w-lg rounded-2xl p-6 max-h-[90vh] overflow-y-auto">

<h2 class="font-bold text-xl">

Tambah / Edit Transaksi

</h2>


<input
id="editID"
type="hidden">


<input
id="tanggal"
type="date"
class="w-full border p-3 rounded-xl mt-4">


<select
id="jenis"
onchange="loadKategori()"
class="w-full border p-3 rounded-xl mt-3">

<option value="Pemasukan">

Pemasukan

</option>

<option value="Pengeluaran">

Pengeluaran

</option>

</select>


<select
id="kategori"
class="w-full border p-3 rounded-xl mt-3">

</select>


<input
id="nominal"
placeholder="Nominal"
class="w-full border p-3 rounded-xl mt-3">


<textarea
id="keterangan"
placeholder="Keterangan"
class="w-full border p-3 rounded-xl mt-3">
</textarea>


<div class="flex gap-3 mt-5">

<button
onclick="saveTransaction()"
class="bg-indigo-600 text-white px-5 py-3 rounded-xl">

Simpan

</button>

<button
onclick="closeModal()"
class="bg-gray-500 text-white px-5 py-3 rounded-xl">

Batal

</button>

</div>

</div>

</div>


<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/export.js"></script>

<div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg flex justify-around p-3 md:hidden">

<button>
🏠
</button>

<button
onclick="openModal()">

➕

</button>

<button
onclick="logout()">

🚪
</button>

</div>

</body>

</html>
